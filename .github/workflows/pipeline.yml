name: A6 CI Pipeline

on:
  push:
    branches: [master, dev]
  pull_request:

jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout step 
      - uses: actions/checkout@v4

      - name: Run Linter (syntax check)
        run: |
          python -m compileall .

  train:
    runs-on: ubuntu-latest
    needs: linter

    if: >
      github.ref == 'refs/heads/master' &&
      contains(github.event.head_commit.message, '[run-train]')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.10

      - name: Install dependencies
        run: |
          pip install torch torchvision mlflow

      - name: Run Training Job
        run: |
          python train.py

      - name: Create error log file
        if: failure()
        run: |
          echo "Training failed. Check logs." > error_logs.txt

      - name: Upload error logs artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error_logs
          path: error_logs.txt

  cleanup:
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Cleanup resources
        run: echo "Cleaning up temporary cloud volumes"