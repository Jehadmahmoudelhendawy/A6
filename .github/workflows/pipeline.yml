name: A5 Pipeline

on:
  push:
    branches:
      - master

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt

      - name: DVC Pull (Mock)
        run: echo "Simulating dvc pull..."

      - name: Train
        run: python train.py

      - name: Upload model info
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

      - name: Upload mlruns
        uses: actions/upload-artifact@v4
        with:
          name: mlruns-artifact
          path: mlruns
      - name: Debug after training
        run: |
          echo "Run ID:"
          cat model_info.txt
          echo "Tree before upload:"
          ls -R

  deploy:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt

      - uses: actions/download-artifact@v4
        with:
          name: model-info
          path: .

      - uses: actions/download-artifact@v4
        with:
          name: mlruns-artifact
          path: ./mlruns

      - name: Check Threshold
        run: python check_threshold.py

      - name: Mock Build
        run: |
          echo "Building Docker image for RUN_ID=$(cat model_info.txt)"

      - name: Docker Build
        run: |
          docker build --build-arg RUN_ID=$(cat model_info.txt) -t app .